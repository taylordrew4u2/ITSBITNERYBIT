<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Roast Mode v2 — takeover, cold state, Roast Buddy</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;color:#1a1a1a;}
  *{box-sizing:border-box;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Palettes ────────────────────────────────────────────────
const BB_BLUE = '#1E90FF';

const FIRE = {
  bg:      '#0B0604',     // near-black, warm
  bg2:     '#140A06',
  card:    '#1A0F0A',
  edge:    'rgba(255,120,50,.14)',
  ash:     'rgba(245,238,231,.35)',
  ember:   '#FF6A35',
  ember2:  '#FFB23F',
  text:    '#F5EEE7',
  sub:     'rgba(245,238,231,.55)',
};

const COLD = {
  bg:      '#161210',     // ashy, no warmth
  card:    '#1F1A18',
  edge:    'rgba(255,255,255,.06)',
  text:    '#C9C3BF',
  sub:     'rgba(201,195,191,.5)',
  grey:    '#6A6460',
};

// ── Roast Buddy glyph (alter-ego of BitBuddy) ───────────────
// Same speech-bubble head, sparkle eyes — but charred, with a
// tiny ember on top instead of the cable dot. Monoline like BB.
function RoastBuddy({ size = 22, color = FIRE.ember2, soot = false }) {
  return (
    <svg viewBox="0 0 1024 1024" width={size} height={size} style={{display:'block'}}>
      <g fill="none" stroke={color} strokeWidth={70} strokeLinecap="round" strokeLinejoin="round">
        {/* bubble head */}
        <path d="M 200 320 a 80 80 0 0 1 80 -80 h 464 a 80 80 0 0 1 80 80 v 344 a 80 80 0 0 1 -80 80 h -176 l -108 108 a 20 20 0 0 1 -34 -14 v -94 h -146 a 80 80 0 0 1 -80 -80 Z" />
        {/* sparkle eyes */}
        <path d="M 404 460 l 18 -52 l 18 52 l 52 18 l -52 18 l -18 52 l -18 -52 l -52 -18 Z" fill={color} stroke="none" />
        <path d="M 620 460 l 18 -52 l 18 52 l 52 18 l -52 18 l -18 52 l -18 -52 l -52 -18 Z" fill={color} stroke="none" />
        {/* smirk (crooked) */}
        <path d="M 450 620 q 50 40 110 10" />
        {/* ember on top */}
        <path d="M 512 240 C 520 192 496 176 504 144 C 540 168 548 200 536 232" strokeWidth="48" />
        <circle cx="520" cy="130" r="18" fill={color} stroke="none" />
        {soot && (
          <>
            <circle cx="270" cy="400" r="10" fill={color} opacity=".5" stroke="none"/>
            <circle cx="760" cy="580" r="8" fill={color} opacity=".4" stroke="none"/>
          </>
        )}
      </g>
    </svg>
  );
}

// BB ref glyph (for the flip-animation reveal)
function BBGlyph({ size = 22, color = '#fff' }) {
  return (
    <svg viewBox="0 0 1024 1024" width={size} height={size} style={{display:'block'}}>
      <g fill="none" stroke={color} strokeWidth={70} strokeLinecap="round" strokeLinejoin="round">
        <path d="M 200 260 a 80 80 0 0 1 80 -80 h 464 a 80 80 0 0 1 80 80 v 344 a 80 80 0 0 1 -80 80 h -176 l -108 108 a 20 20 0 0 1 -34 -14 v -94 h -146 a 80 80 0 0 1 -80 -80 Z" />
        <path d="M 404 420 l 18 -52 l 18 52 l 52 18 l -52 18 l -18 52 l -18 -52 l -52 -18 Z" fill={color} stroke="none" />
        <path d="M 620 420 l 18 -52 l 18 52 l 52 18 l -52 18 l -18 52 l -18 -52 l -52 -18 Z" fill={color} stroke="none" />
      </g>
    </svg>
  );
}

function Flame({ size = 20, color = FIRE.ember, fill = true }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <path d="M12 3c.8 2.2.3 4-1 5.5-1.6 1.8-2.5 3.5-2.5 5.5 0 3.6 2.9 6.5 6.5 6.5s6.5-2.9 6.5-6.5c0-3-1.5-5-3.3-6.8-.7 1.1-1.7 1.8-2.7 1.8.5-2.3-.7-4.8-3.5-6z"
            stroke={color} strokeWidth="1.6" strokeLinejoin="round" fill={fill?color+'22':'none'}/>
    </svg>
  );
}

// ── Device frame ────────────────────────────────────────────
function Device({ children, tone = 'light', w = 390, h = 844 }) {
  const bg = tone === 'fire' ? FIRE.bg : tone === 'cold' ? COLD.bg : tone === 'dark' ? '#0A0E14' : '#F2F2F7';
  const statusColor = tone === 'light' ? '#000' : '#fff';
  return (
    <div style={{
      width:w,height:h,borderRadius:48,overflow:'hidden',position:'relative',
      background:bg,
      boxShadow:'0 40px 80px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.12)',
    }}>
      <div style={{position:'absolute',top:11,left:'50%',transform:'translateX(-50%)',width:126,height:37,borderRadius:24,background:'#000',zIndex:50}}/>
      <div style={{position:'absolute',top:0,left:0,right:0,zIndex:10,padding:'21px 32px 0',display:'flex',justifyContent:'space-between',color:statusColor,fontSize:17,fontWeight:600}}>
        <span>9:41</span>
        <span style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{display:'inline-block',width:18,height:11,borderRadius:2,border:`1.5px solid ${statusColor}`,position:'relative'}}>
            <span style={{position:'absolute',inset:1.5,width:12,background:statusColor,borderRadius:1}}/>
          </span>
        </span>
      </div>
      {children}
      <div style={{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',width:139,height:5,borderRadius:100,background:tone==='light'?'rgba(0,0,0,.25)':'rgba(255,255,255,.7)',zIndex:60}}/>
    </div>
  );
}

// ── Scaffolds ───────────────────────────────────────────────
function Chip({ children, active, tone='blue' }) {
  const c = tone==='ember' ? FIRE.ember : BB_BLUE;
  return <div style={{padding:'6px 14px',borderRadius:14,background:active?c:'#fff',color:active?'#fff':'#1a1a1a',fontSize:14,fontWeight:600,boxShadow:active?'none':'0 1px 2px rgba(0,0,0,.04)'}}>{children}</div>;
}

// Base Jokes screen (light) — for showing the "before takeover" state
function JokesLight() {
  return (
    <div style={{position:'absolute',inset:0,background:'#F2F2F7',paddingTop:62}}>
      <div style={{padding:'16px 20px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:30,fontWeight:700,letterSpacing:-.6}}>Jokes</div>
        <div style={{width:36,height:36,borderRadius:18,background:'#E5F1FD',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <BBGlyph size={20} color={BB_BLUE}/>
        </div>
      </div>
      <div style={{margin:'0 20px',height:40,borderRadius:12,background:'rgba(120,120,128,.12)',display:'flex',alignItems:'center',padding:'0 14px',color:'rgba(60,60,67,.5)',fontSize:15}}>Search jokes</div>
      <div style={{display:'flex',gap:8,padding:'14px 20px'}}>
        <Chip>★ Hits</Chip><Chip active>All</Chip><Chip>Recent</Chip>
      </div>
      <div style={{margin:'4px 20px',padding:'14px 16px',borderRadius:14,background:'#fff'}}>
        <div style={{fontSize:16,fontWeight:600}}>Cats Crazy Because Purr</div>
        <div style={{fontSize:14,color:'rgba(60,60,67,.6)',marginTop:3}}>Cats are crazy, because they purr.</div>
      </div>
      <div style={{margin:'8px 20px',padding:'14px 16px',borderRadius:14,background:'#fff'}}>
        <div style={{fontSize:16,fontWeight:600}}>Uber driver asked if I was okay</div>
      </div>
    </div>
  );
}

// ── Flame-wipe transition: six frames showing the takeover ──
function FlameWipe({ progress = 0 }) {
  // progress 0..1 — flame sweeps up from bottom, charring behind it
  const h = progress * 100;
  return (
    <div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden'}}>
      {/* charred region (already burned) */}
      <div style={{position:'absolute',left:0,right:0,bottom:0,height:`${h}%`,
        background:`linear-gradient(180deg, transparent 0%, ${FIRE.bg2} 12%, ${FIRE.bg} 100%)`,
      }}/>
      {/* flame front */}
      {progress > 0 && progress < 1 && (
        <div style={{position:'absolute',left:0,right:0,bottom:`${h}%`,height:120,
          background:`linear-gradient(180deg, transparent 0%, ${FIRE.ember2}66 40%, ${FIRE.ember} 70%, #E8451E 100%)`,
          filter:'blur(6px)',
          transform:'translateY(50%)',
        }}/>
      )}
      {/* embers */}
      {progress > 0.1 && progress < 0.95 && [...Array(8)].map((_,i)=>{
        const left = (i*13 + 7) % 100;
        const y = 100 - h - (i%3)*8 - 5;
        return <div key={i} style={{position:'absolute',left:`${left}%`,top:`${y}%`,width:3,height:3,borderRadius:2,background:FIRE.ember2,boxShadow:`0 0 6px ${FIRE.ember}`,opacity:.8}}/>;
      })}
    </div>
  );
}

// ── Mid-flip "Roast Mode" badge reveal ─────────────────────
function RoastTitleCard({ tiny=false }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:10,padding:tiny?'6px 12px':'10px 18px',borderRadius:999,
      background:`linear-gradient(135deg, ${FIRE.ember} 0%, #E8451E 100%)`,
      boxShadow:`0 8px 24px ${FIRE.ember}66, inset 0 0 0 .5px rgba(255,255,255,.2)`,
    }}>
      <Flame size={tiny?12:16} color="#fff" fill={false}/>
      <span style={{fontSize:tiny?10:12,fontWeight:800,color:'#fff',letterSpacing:1.4,textTransform:'uppercase'}}>Roast Mode</span>
    </div>
  );
}

// ── Roast-mode header (fire) ────────────────────────────────
function RoastHeader({ subjectCount=12, hotCount=3 }) {
  return (
    <div style={{padding:'72px 20px 14px',position:'relative'}}>
      {/* single hero glow — only one */}
      <div style={{position:'absolute',top:20,right:-60,width:260,height:260,borderRadius:'50%',
        background:`radial-gradient(circle, ${FIRE.ember}33 0%, transparent 70%)`,filter:'blur(24px)',pointerEvents:'none'}}/>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
        <RoastTitleCard tiny/>
        <span style={{fontSize:11,color:FIRE.sub}}>{hotCount} burning · {subjectCount - hotCount} warm</span>
      </div>
      <div style={{fontSize:32,fontWeight:800,letterSpacing:-.8,color:FIRE.text,lineHeight:1.05}}>Who's getting roasted?</div>
      <div style={{fontSize:13,color:FIRE.sub,marginTop:4}}>{subjectCount} people · 48 bits</div>
    </div>
  );
}

// ── Heat bar w/ CORRECT color logic ─────────────────────────
// Bar color is a function of heat, not fixed gradient.
function HeatBar({ heat }) {
  // 0..30 ashy grey, 30..60 amber, 60..85 orange, 85..100 ember+glow
  const fill = heat < 30
    ? 'linear-gradient(90deg, #5A4A40 0%, #7A6A5A 100%)'
    : heat < 60
    ? `linear-gradient(90deg, #8A6A3A 0%, ${FIRE.ember2} 100%)`
    : heat < 85
    ? `linear-gradient(90deg, ${FIRE.ember2} 0%, ${FIRE.ember} 100%)`
    : `linear-gradient(90deg, ${FIRE.ember} 0%, #FF2E00 100%)`;
  const glow = heat < 60 ? 'none' : heat < 85 ? `0 0 6px ${FIRE.ember}55` : `0 0 12px ${FIRE.ember}aa`;
  const numColor = heat < 30 ? COLD.grey : heat < 60 ? FIRE.ember2 : FIRE.ember;
  return (
    <div style={{marginTop:12,display:'flex',alignItems:'center',gap:8}}>
      <div style={{flex:1,height:4,borderRadius:2,background:'rgba(245,238,231,.06)',overflow:'hidden'}}>
        <div style={{height:'100%',width:`${heat}%`,background:fill,borderRadius:2,boxShadow:glow}}/>
      </div>
      <div style={{fontSize:10,color:numColor,fontWeight:700,minWidth:32,textAlign:'right',letterSpacing:.4}}>{heat}°</div>
    </div>
  );
}

// Subject card — single "on fire" flourish saved for #1 only
function SubjectCard({ name, role, bits, heat, avatar, rank }) {
  const isTop = rank === 1;
  return (
    <div style={{margin:'6px 16px',padding:16,borderRadius:18,
      background:isTop?`linear-gradient(135deg, ${FIRE.card} 0%, #2A1812 100%)`:FIRE.card,
      border:isTop?`.5px solid ${FIRE.ember}66`:`.5px solid ${FIRE.edge}`,
      position:'relative',overflow:'hidden',
      boxShadow:isTop?`0 8px 24px ${FIRE.ember}26`:'none'}}>
      {/* reserved glow — ONLY top target */}
      {isTop && <div style={{position:'absolute',top:-30,right:-30,width:140,height:140,borderRadius:'50%',
        background:`radial-gradient(circle, ${FIRE.ember}44 0%, transparent 70%)`,filter:'blur(16px)',pointerEvents:'none'}}/>}
      <div style={{display:'flex',alignItems:'center',gap:12,position:'relative'}}>
        <div style={{width:44,height:44,borderRadius:22,background:avatar,display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,fontWeight:700,color:'#fff',flexShrink:0}}>
          {name.split(' ').map(n=>n[0]).join('')}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:16,fontWeight:700,color:FIRE.text,letterSpacing:-.2}}>{name}</div>
          <div style={{fontSize:12,color:FIRE.sub,marginTop:1}}>{role}</div>
        </div>
        <div style={{textAlign:'right'}}>
          <div style={{fontSize:20,fontWeight:800,color:FIRE.text,lineHeight:1}}>{bits}</div>
          <div style={{fontSize:10,color:FIRE.sub,marginTop:2,textTransform:'uppercase',letterSpacing:.8,fontWeight:600}}>bits</div>
        </div>
      </div>
      <HeatBar heat={heat}/>
    </div>
  );
}

// ── Cold / empty state ──────────────────────────────────────
function ColdState() {
  return (
    <div style={{position:'absolute',inset:0,background:COLD.bg,paddingTop:62,display:'flex',flexDirection:'column'}}>
      <div style={{padding:'18px 20px 10px',display:'flex',alignItems:'center',gap:10}}>
        {/* roast badge but desaturated */}
        <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',borderRadius:999,background:'rgba(255,255,255,.04)',border:`.5px solid ${COLD.edge}`}}>
          <Flame size={12} color={COLD.grey} fill={false}/>
          <span style={{fontSize:10,fontWeight:800,color:COLD.grey,letterSpacing:1.4,textTransform:'uppercase'}}>Roast Mode</span>
        </div>
        <span style={{fontSize:11,color:COLD.sub}}>no fire yet</span>
      </div>

      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'0 40px',gap:20}}>
        {/* Unlit match */}
        <div style={{position:'relative',width:140,height:140,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg viewBox="0 0 140 140" width="140" height="140">
            <g transform="rotate(-20 70 70)">
              {/* stick */}
              <rect x="66" y="40" width="8" height="72" rx="2" fill={COLD.grey} opacity=".7"/>
              {/* head (unlit, grey) */}
              <ellipse cx="70" cy="36" rx="12" ry="16" fill={COLD.grey}/>
              <ellipse cx="67" cy="30" rx="3" ry="5" fill="rgba(255,255,255,.08)"/>
            </g>
            {/* tiny wisp — hint of potential */}
            <path d="M 95 30 q 3 -8 -2 -14 q 8 4 6 14" fill="none" stroke={COLD.grey} strokeWidth="1.5" opacity=".4" strokeLinecap="round"/>
          </svg>
        </div>

        <div style={{textAlign:'center'}}>
          <div style={{fontSize:26,fontWeight:800,color:COLD.text,letterSpacing:-.5,lineHeight:1.15}}>Nothing to burn yet.</div>
          <div style={{fontSize:14,color:COLD.sub,marginTop:10,lineHeight:1.5,maxWidth:280,margin:'10px auto 0'}}>
            Add a subject — your mom, your coworker, your landlord. BitBuddy will start collecting bits.
          </div>
        </div>

        {/* ember-tipped primary CTA — the only warm thing on screen */}
        <div style={{padding:'14px 24px',borderRadius:999,background:`linear-gradient(135deg, ${FIRE.ember} 0%, #E8451E 100%)`,color:'#fff',fontSize:15,fontWeight:700,display:'flex',alignItems:'center',gap:8,boxShadow:`0 12px 28px ${FIRE.ember}4D`,marginTop:6}}>
          <Flame size={16} color="#fff" fill={false}/>
          Light the first match
        </div>

        <div style={{fontSize:11,color:COLD.sub,marginTop:4}}>or import from Contacts</div>
      </div>
    </div>
  );
}

// ── Takeover transition — sequence of frames ────────────────
function TakeoverFrame({ progress }) {
  // Shows the flip at a given progress 0..1.
  // 0     = light app, user taps "Enter Roast Mode"
  // 0.15  = flame front rises from bottom
  // 0.45  = screen is ~half charred; embers in the air
  // 0.75  = fire covers screen, central Roast badge blooming
  // 1.00  = roast home settled
  return (
    <Device tone={progress >= 0.55 ? 'fire' : 'light'}>
      {progress < 0.55 ? <JokesLight/> : <RoastHomeQuick/>}
      <FlameWipe progress={progress}/>
      {/* center badge — appears mid-flip */}
      {progress >= 0.35 && progress < 0.95 && (
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:80,pointerEvents:'none'}}>
          <div style={{transform:`scale(${0.6 + (progress-0.35)*1.2})`,opacity:Math.min(1,(progress-0.3)*3)}}>
            <RoastTitleCard/>
          </div>
        </div>
      )}
      {/* initial tap target — visible only at 0 */}
      {progress < 0.05 && (
        <div style={{position:'absolute',bottom:100,left:'50%',transform:'translateX(-50%)',zIndex:70,
          padding:'14px 22px',borderRadius:999,
          background:`linear-gradient(135deg, ${FIRE.ember} 0%, #E8451E 100%)`,
          boxShadow:`0 16px 40px ${FIRE.ember}66`,
          display:'flex',alignItems:'center',gap:8,color:'#fff',fontSize:14,fontWeight:700}}>
          <Flame size={16} color="#fff" fill={false}/>
          Enter Roast Mode
        </div>
      )}
    </Device>
  );
}

function RoastHomeQuick() {
  return (
    <div style={{position:'absolute',inset:0,background:FIRE.bg}}>
      <RoastHeader/>
      <SubjectCard rank={1} name="Mom" role="Tech-skeptic, loves TikTok" bits={14} heat={92} avatar={`linear-gradient(135deg, ${FIRE.ember} 0%, #C23618 100%)`}/>
      <SubjectCard rank={2} name="Dave K." role="Gym friend, CrossFit" bits={9} heat={76} avatar={`linear-gradient(135deg, ${FIRE.ember2} 0%, #D17A00 100%)`}/>
      <SubjectCard rank={3} name="Landlord" role="The Slumlord" bits={5} heat={34} avatar={`linear-gradient(135deg, #7A6B5C 0%, #4A3F35 100%)`}/>
    </div>
  );
}

// ── Roast Buddy in chat (alter-ego) ─────────────────────────
function RoastBuddyChat() {
  return (
    <div style={{position:'absolute',inset:0,background:FIRE.bg,paddingTop:62,display:'flex',flexDirection:'column'}}>
      {/* header */}
      <div style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:12,borderBottom:`.5px solid ${FIRE.edge}`}}>
        <div style={{width:40,height:40,borderRadius:20,background:`linear-gradient(135deg, #3A1810 0%, #1A0D08 100%)`,display:'flex',alignItems:'center',justifyContent:'center',border:`.5px solid ${FIRE.ember}44`,boxShadow:`0 0 16px ${FIRE.ember}33`}}>
          <RoastBuddy size={24} color={FIRE.ember2} soot/>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:FIRE.text}}>Roast Buddy</div>
          <div style={{fontSize:11,color:FIRE.sub,marginTop:1,display:'flex',alignItems:'center',gap:5}}>
            <span style={{width:6,height:6,borderRadius:3,background:FIRE.ember}}/> sharpening
          </div>
        </div>
        <div style={{fontSize:10,color:FIRE.sub,padding:'4px 8px',borderRadius:6,background:'rgba(255,255,255,.04)',border:`.5px solid ${FIRE.edge}`,fontWeight:600,letterSpacing:.5}}>MEAN</div>
      </div>
      {/* thread */}
      <div style={{flex:1,padding:'14px 16px',display:'flex',flexDirection:'column',gap:10,overflow:'hidden'}}>
        <RBubble who="them"><b>That bit about Mom's iPad?</b> Soft. She'd laugh at you, not with you. Lean meaner on the "two-finger scroll."</RBubble>
        <RBubble who="me">ok ok what's the punch</RBubble>
        <RBubble who="them">"She doesn't swipe — she <i>apologizes</i> to the screen."</RBubble>
        <div style={{fontSize:10,color:FIRE.sub,textAlign:'center',marginTop:2}}>2 more angles · tap to see</div>
      </div>
      {/* composer */}
      <div style={{padding:'10px 14px',borderTop:`.5px solid ${FIRE.edge}`,display:'flex',gap:8,alignItems:'center',background:FIRE.bg2}}>
        <div style={{flex:1,height:34,borderRadius:17,background:'rgba(255,255,255,.05)',padding:'0 14px',display:'flex',alignItems:'center',fontSize:13,color:FIRE.sub}}>Sharpen this bit…</div>
        <div style={{width:34,height:34,borderRadius:17,background:`linear-gradient(135deg, ${FIRE.ember} 0%, #E8451E 100%)`,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 4px 12px ${FIRE.ember}66`}}>
          <svg width="13" height="13" viewBox="0 0 12 12"><path d="M6 10V2M2 6l4-4 4 4" stroke="#fff" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
      </div>
    </div>
  );
}

function RBubble({ who, children }) {
  const me = who === 'me';
  return (
    <div style={{display:'flex',justifyContent:me?'flex-end':'flex-start'}}>
      <div style={{
        maxWidth:'82%',padding:'9px 13px',borderRadius:16,
        background:me?`linear-gradient(135deg, ${FIRE.ember} 0%, #E8451E 100%)`:'rgba(255,255,255,.05)',
        color:me?'#fff':FIRE.text,
        border:me?'none':`.5px solid ${FIRE.edge}`,
        borderBottomRightRadius:me?5:16,
        borderBottomLeftRadius:me?16:5,
        fontSize:13,lineHeight:1.4,
      }}>{children}</div>
    </div>
  );
}

// ── Side-by-side: Buddy vs Roast Buddy ──────────────────────
function AlterEgo() {
  return (
    <div style={{display:'flex',gap:40,alignItems:'center',padding:40,background:'#fff',borderRadius:20,justifyContent:'center'}}>
      <div style={{textAlign:'center'}}>
        <div style={{width:120,height:120,borderRadius:28,background:BB_BLUE,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 24px rgba(30,144,255,.3)'}}>
          <BBGlyph size={70} color="#fff"/>
        </div>
        <div style={{fontSize:14,fontWeight:700,marginTop:14,color:'#2a2015'}}>BitBuddy</div>
        <div style={{fontSize:11,color:'#7a7a7a',marginTop:2}}>kind · helpful · curious</div>
      </div>
      <div style={{fontSize:24,color:'#b8a888',fontWeight:300}}>→</div>
      <div style={{textAlign:'center'}}>
        <div style={{width:120,height:120,borderRadius:28,background:`linear-gradient(135deg, #2A1812 0%, #0F0604 100%)`,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 8px 24px ${FIRE.ember}4D, inset 0 0 0 .5px ${FIRE.ember}44`,position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:-20,right:-20,width:80,height:80,borderRadius:40,background:`radial-gradient(circle, ${FIRE.ember}77 0%, transparent 70%)`,filter:'blur(8px)'}}/>
          <RoastBuddy size={70} color={FIRE.ember2} soot/>
        </div>
        <div style={{fontSize:14,fontWeight:700,marginTop:14,color:'#2a2015'}}>Roast Buddy</div>
        <div style={{fontSize:11,color:'#7a7a7a',marginTop:2}}>sharp · merciless · affectionate</div>
      </div>
    </div>
  );
}

// ── Page ────────────────────────────────────────────────────
function Page() {
  return (
    <div style={{padding:'48px 40px 100px',background:'#F5F3EE',minHeight:'100vh'}}>
      <div style={{maxWidth:1480,margin:'0 auto'}}>
        <div style={{fontSize:11,letterSpacing:2,textTransform:'uppercase',color:'#9a8a70',fontWeight:600}}>BitBinder · Roast Mode v2</div>
        <div style={{fontSize:36,fontWeight:700,letterSpacing:-.8,color:'#2a2015',marginTop:8}}>Takeover · cold state · Roast Buddy</div>
        <div style={{fontSize:15,color:'#5a4a30',marginTop:10,lineHeight:1.55,maxWidth:760}}>
          Three pieces. (1) The <b>takeover moment</b> — striking a match, not a theme toggle.
          (2) The <b>cold state</b> — what it looks like when nothing is burning. (3) <b>Roast Buddy</b> —
          BitBuddy's alter-ego: same shape, sharper voice. Fire palette is intentional and total.
        </div>

        {/* ─── 01 Takeover ─── */}
        <Section n="01" title="The takeover" sub="Not a theme swap — a ceremony. Tap the ember button → flame front sweeps up from the bottom → ROAST MODE title blooms → lands in the fire home. ~450ms total with a subtle haptic at the peak.">
          <div style={{display:'grid',gridTemplateColumns:'repeat(6, max-content)',gap:20}}>
            {[0, 0.2, 0.45, 0.7, 0.85, 1].map((p,i) => (
              <div key={i} style={{display:'flex',flexDirection:'column',gap:8}}>
                <div style={{fontSize:11,fontWeight:600,color:'rgba(60,50,40,.7)'}}>t = {Math.round(p*450)}ms</div>
                <div style={{transform:'scale(.45)',transformOrigin:'top left',width:390*0.45,height:844*0.45}}>
                  <TakeoverFrame progress={p}/>
                </div>
                <div style={{fontSize:10,color:'rgba(60,50,40,.55)',marginTop:-260}}>
                  {i===0 && 'Tap target'}
                  {i===1 && 'Flame rises'}
                  {i===2 && 'Badge blooms'}
                  {i===3 && 'Screen is lit'}
                  {i===4 && 'Settling'}
                  {i===5 && 'Roast home'}
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:40,padding:20,borderRadius:16,background:'#fff',border:'1px solid #E5E2D9',maxWidth:780}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:1.4,textTransform:'uppercase',color:'#9a8a70'}}>Spec</div>
            <ul style={{fontSize:13,color:'#3a3328',lineHeight:1.65,paddingLeft:18,marginTop:8}}>
              <li><b>Activation</b>: ember pill at bottom of Jokes list, or long-press a person's avatar → "Roast"</li>
              <li><b>Curve</b>: flame front uses easeInQuart (slow start, fast finish)</li>
              <li><b>Haptic</b>: medium impact at t≈200ms (flame-front at midscreen)</li>
              <li><b>Sound</b> (optional, off by default): soft whoosh 180ms</li>
              <li><b>Exit</b>: same sequence reversed — flame descends, app surfaces back to light</li>
              <li><b>Accessibility</b>: honor Reduce Motion → cross-fade in 150ms, no flame wipe</li>
            </ul>
          </div>
        </Section>

        {/* ─── 02 Cold state ─── */}
        <Section n="02" title="The cold state" sub="Fire themes die if there's nothing burning. Day-one state: ashy grey-black, one unlit match, a single warm CTA. The CTA is the only heat on screen — it's a promise.">
          <div style={{display:'flex',gap:40,flexWrap:'wrap'}}>
            <div>
              <div style={{fontSize:12,color:'rgba(60,50,40,.7)',marginBottom:10,fontWeight:500}}>02a · zero subjects</div>
              <Device tone="cold"><ColdState/></Device>
              <div style={{fontSize:12,color:'rgba(60,50,40,.55)',marginTop:10,maxWidth:380,lineHeight:1.45}}>Ashy, not warm. Only the CTA carries flame color. Feels like potential, not emptiness.</div>
            </div>
            <div style={{maxWidth:420,paddingTop:20}}>
              <div style={{fontSize:13,fontWeight:700,color:'#2a2015',marginBottom:10}}>Why grey-on-black, not black-on-black</div>
              <p style={{fontSize:13,color:'#5a4a30',lineHeight:1.6,margin:0}}>
                If day-one is already the full fire palette, the mode has nowhere to go when the user adds their first target. The cold state gives the heat somewhere to arrive from — lighting the first match literally warms the UI.
              </p>
              <div style={{fontSize:13,fontWeight:700,color:'#2a2015',marginTop:24,marginBottom:10}}>Warming sequence</div>
              <div style={{fontSize:13,color:'#5a4a30',lineHeight:1.7}}>
                0 subjects → cold (grey)<br/>
                1 subject &lt; 30° → warm (amber accents only)<br/>
                ≥ 1 subject ≥ 60° → full fire palette<br/>
                Transition: palette cross-fade over ~400ms when crossing thresholds.
              </div>
            </div>
          </div>
        </Section>

        {/* ─── 03 Roast Buddy ─── */}
        <Section n="03" title="Roast Buddy" sub="BitBuddy's alter-ego. Same monoline stroke, same speech-bubble shape, same sparkle eyes — but charred, ember-topped instead of cable-dot, crooked smirk instead of smile. When Roast Mode is on, BitBuddy becomes this.">
          <div style={{display:'flex',gap:40,flexWrap:'wrap',alignItems:'flex-start'}}>
            <div style={{maxWidth:620}}>
              <AlterEgo/>
              <div style={{marginTop:24,padding:20,borderRadius:16,background:'#fff',border:'1px solid #E5E2D9'}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:1.4,textTransform:'uppercase',color:'#9a8a70'}}>Voice rules</div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginTop:12,fontSize:13,lineHeight:1.55,color:'#3a3328'}}>
                  <div><b style={{color:BB_BLUE}}>BitBuddy</b><br/>"Hey! I saw your cat joke — want me to punch up the setup?"</div>
                  <div><b style={{color:FIRE.ember}}>Roast Buddy</b><br/>"That cat joke's flat. Your setup telegraphs the punch three beats early. Cut the first clause."</div>
                </div>
              </div>
              <div style={{marginTop:24,padding:20,borderRadius:16,background:'#fff',border:'1px solid #E5E2D9'}}>
                <div style={{fontSize:11,fontWeight:700,letterSpacing:1.4,textTransform:'uppercase',color:'#9a8a70'}}>Safety rails</div>
                <ul style={{fontSize:13,color:'#3a3328',lineHeight:1.65,paddingLeft:18,margin:'8px 0 0'}}>
                  <li>Subject must be added by user — never auto-proposes a real person</li>
                  <li>Intensity slider (Gentle / Mean / Brutal) — default Mean</li>
                  <li>Refuses bits that target protected classes, not the individual</li>
                  <li>"Back to BitBuddy" always one tap — exits whole mode</li>
                </ul>
              </div>
            </div>
            <div>
              <div style={{fontSize:12,color:'rgba(60,50,40,.7)',marginBottom:10,fontWeight:500}}>03a · Roast Buddy chat</div>
              <Device tone="fire"><RoastBuddyChat/></Device>
            </div>
          </div>
        </Section>

        {/* ─── 04 Subjects (the main screen, refreshed) ─── */}
        <Section n="04" title="Subjects · main screen, revised" sub="Applying the fixes from the audit: one reserved glow on the #1 subject, heat-bar color actually scales with heat, copy softened to 'Who's getting roasted?'.">
          <div style={{display:'flex',gap:40,flexWrap:'wrap'}}>
            <div>
              <div style={{fontSize:12,color:'rgba(60,50,40,.7)',marginBottom:10,fontWeight:500}}>04a · fire home</div>
              <Device tone="fire">
                <div style={{position:'absolute',inset:0,background:FIRE.bg}}>
                  <RoastHeader/>
                  <SubjectCard rank={1} name="Mom" role="Tech-skeptic, loves TikTok" bits={14} heat={92} avatar={`linear-gradient(135deg, ${FIRE.ember} 0%, #C23618 100%)`}/>
                  <SubjectCard rank={2} name="Dave K." role="Gym friend, CrossFit" bits={9} heat={76} avatar={`linear-gradient(135deg, ${FIRE.ember2} 0%, #D17A00 100%)`}/>
                  <SubjectCard rank={3} name="Uber Drivers" role="Category" bits={7} heat={58} avatar={`linear-gradient(135deg, #5B7FD9 0%, #2E4BA5 100%)`}/>
                  <SubjectCard rank={4} name="Landlord" role="The Slumlord" bits={5} heat={34} avatar={`linear-gradient(135deg, #7A6B5C 0%, #4A3F35 100%)`}/>
                  <SubjectCard rank={5} name="Old Coach" role="Middle school" bits={2} heat={18} avatar={`linear-gradient(135deg, #5A5049 0%, #3A3028 100%)`}/>
                </div>
              </Device>
            </div>
            <div style={{maxWidth:420,paddingTop:20}}>
              <div style={{fontSize:13,fontWeight:700,color:'#2a2015',marginBottom:10}}>Heat formula (spec'd)</div>
              <div style={{padding:14,borderRadius:12,background:'#2a2015',color:'#f5eee7',fontFamily:'SFMono-Regular, Menlo, monospace',fontSize:12,lineHeight:1.7}}>
                heat = min(100,<br/>
                &nbsp;&nbsp;bits * 4<br/>
                &nbsp;&nbsp;+ recent_practice * 8<br/>
                &nbsp;&nbsp;+ last_hit_days &lt;= 3 ? 20 : 0<br/>
                &nbsp;&nbsp;− days_since_used * 2<br/>
                )
              </div>
              <div style={{fontSize:12,color:'#5a4a30',marginTop:10,lineHeight:1.55}}>Shown as a tooltip on first view of a heat meter. Cools ~2°/day of neglect.</div>

              <div style={{fontSize:13,fontWeight:700,color:'#2a2015',marginTop:24,marginBottom:10}}>Glow hierarchy (final)</div>
              <div style={{fontSize:13,color:'#5a4a30',lineHeight:1.7}}>
                <b>Hero glow</b>: screen header (one)<br/>
                <b>Reserved glow</b>: #1 hottest subject card only<br/>
                <b>Ember tint</b>: hot (&gt;60°) heat bars<br/>
                <b>No glow</b>: warm/cold subjects, toggles, nav
              </div>
            </div>
          </div>
        </Section>

        <div style={{marginTop:56,maxWidth:720}}>
          <div style={{fontSize:18,fontWeight:600,color:'#2a2015'}}>Next</div>
          <ul style={{fontSize:14,color:'#5a4a30',lineHeight:1.7,paddingLeft:20}}>
            <li>Sign off on the takeover — I'll prototype it interactive so you can feel the timing</li>
            <li>Sign off on Roast Buddy — then I'll do the full export (avatar, hero, chip states)</li>
            <li>Open questions: sound on/off by default? Intensity slider default "Mean" OK?</li>
          </ul>
        </div>
      </div>
    </div>
  );
}

function Section({ n, title, sub, children }) {
  return (
    <div style={{marginTop:64}}>
      <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:6}}>
        <div style={{fontSize:12,fontWeight:700,color:'#b8a888',letterSpacing:1.5}}>{n}</div>
        <div style={{fontSize:24,fontWeight:700,letterSpacing:-.4,color:'#2a2015'}}>{title}</div>
      </div>
      {sub && <div style={{fontSize:14,color:'#5a4a30',marginTop:6,marginBottom:24,lineHeight:1.5,maxWidth:780}}>{sub}</div>}
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
</body>
</html>
