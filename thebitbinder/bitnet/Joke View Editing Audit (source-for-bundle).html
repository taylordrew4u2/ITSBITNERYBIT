// ─── Annotations / callouts overlay ────────────────────────
function Callout({ x, y, n, side='right', children, tone='issue' }) {
  const palette = tone==='good'
    ? {dot:'#10B981', line:'rgba(16,185,129,.5)', bg:'#F0FBF6', border:'#B5E8CF', label:'#08784E'}
    : tone==='note'
    ? {dot:'#6B7280', line:'rgba(107,114,128,.5)', bg:'#F9FAFB', border:'#E5E7EB', label:'#374151'}
    : {dot:'#EA580C', line:'rgba(234,88,12,.5)', bg:'#FFF7ED', border:'#FDBA74', label:'#9A3412'};
  const isLeft = side === 'left';
  return (
    <div style={{position:'absolute',left:x,top:y,display:'flex',alignItems:'center',gap:10,flexDirection:isLeft?'row-reverse':'row',pointerEvents:'none',zIndex:5}}>
      <div style={{width:22,height:22,borderRadius:11,background:palette.dot,color:'#fff',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 0 0 3px ${palette.line}33`,flexShrink:0}}>{n}</div>
      <div style={{width:24,height:1,background:palette.line}}/>
      <div style={{padding:'8px 10px',borderRadius:8,background:palette.bg,border:`1px solid ${palette.border}`,maxWidth:240,fontSize:11,lineHeight:1.4,color:palette.label}}>
        {children}
      </div>
    </div>
  );
}

            <li><b>Dopamine vs overwhelm on AI assist.</b> A prominent "Punch up" button is a quick hit when you're stuck. But ADHD writers are also prone to outsourcing the fun part. Push to More, or keep as primary?</li>
            <li><b>Beat tagging (Setup/Punch/Callback)</b> is new. It unlocks time-on-stage math and set-list pacing, but adds a tagging step. Should it be optional per-joke or quietly auto-inferred from punctuation?</li>
            <li><b>Swipe-between-jokes</b> is natural for reading. Tricky when the content field owns the gesture. Edge-gesture zone (leftmost 12pt) or a dedicated prev/next tap?</li>
            <li><b>Delete placement.</b> Current app keeps trash in the toolbar; revision hides it under "More." For an impulsive brain, both have trade-offs: prominent = easy to misfire, buried = harder to recover from an accidental commit. Your call.</li>
            <li><b>"Resume where I left off" on reopen.</b> When a user returns to a joke they were mid-edit on, should the cursor restore to the exact character? Helps ADHD re-entry; might feel uncanny.</li>
          </ul>
        </Section>

        <div style={{marginTop:56,maxWidth:720,color:'#5a4a30',fontSize:13,lineHeight:1.6}}>
          Every decision above is in service of <b>lower cognitive load per open</b>: fewer shapes to interpret, fewer hidden panels, fewer small decisions on the path from idea to page. If this reads right I'll build an interactive prototype so you can feel the reading → editing transition, the Downstage tray, and the swipe between jokes. Flag anything you want reconsidered first.
        </div>
      </div>
    </div>
  );
}

function Card({ title, children, tone }) {
  const palette = tone==='good'
    ? {bg:'#F0FBF6', border:'#B5E8CF', label:'#08784E'}
    : {bg:'#fff', border:'#E5E2D9', label:'#EA580C'};
  return (
    <div style={{padding:18,borderRadius:14,background:palette.bg,border:`1px solid ${palette.border}`}}>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:1.2,textTransform:'uppercase',color:palette.label,marginBottom:8}}>
        {tone==='good' ? 'Keep' : 'Issue'}
      </div>
      <div style={{fontSize:14,fontWeight:700,color:'#2a2015',marginBottom:6}}>{title}</div>
      <div style={{fontSize:12,color:'#3a3328',lineHeight:1.6}}>{children}</div>
    </div>
  );
}

function SpecRow({ area, now, next, last }) {
  const bd = last ? 'none' : '1px solid #F0ECDF';
  return (
    <tr>
      <td style={{padding:'10px 12px',borderBottom:bd,fontWeight:600,color:'#2a2015',verticalAlign:'top'}}>{area}</td>
      <td style={{padding:'10px 12px',borderBottom:bd,color:'#6b5f4a',verticalAlign:'top',lineHeight:1.5}}>{now}</td>
      <td style={{padding:'10px 12px',borderBottom:bd,color:'#2a2015',verticalAlign:'top',lineHeight:1.5}}>{next}</td>
    </tr>
  );
}

function Section({ n, title, sub, children }) {
  return (
    <div style={{marginTop:64}}>
      <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:6}}>
        <div style={{fontSize:12,fontWeight:700,color:'#b8a888',letterSpacing:1.5}}>{n}</div>
        <div style={{fontSize:24,fontWeight:700,letterSpacing:-.4,color:'#2a2015'}}>{title}</div>
      </div>
      {sub && <div style={{fontSize:14,color:'#5a4a30',marginTop:6,marginBottom:24,lineHeight:1.5,maxWidth:780}}>{sub}</div>}
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
