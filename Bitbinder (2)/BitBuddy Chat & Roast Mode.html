<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>BitBuddy chat + Roast Mode — design</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;color:#1a1a1a;}
  *{box-sizing:border-box;}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── BitBuddy glyph — reused inline ─────────────────────────
const BB_BLUE = '#1E90FF';
const BB_DEEP = '#0B63C5';

function BBGlyph({ stroke = '#fff', size = 22 }) {
  return (
    <svg viewBox="0 0 1024 1024" width={size} height={size} style={{display:'block'}}>
      <g fill="none" stroke={stroke} strokeWidth={70} strokeLinecap="round" strokeLinejoin="round">
        <path d="M 200 260 a 80 80 0 0 1 80 -80 h 464 a 80 80 0 0 1 80 80 v 344 a 80 80 0 0 1 -80 80 h -176 l -108 108 a 20 20 0 0 1 -34 -14 v -94 h -146 a 80 80 0 0 1 -80 -80 Z" />
        <path d="M 404 420 l 18 -52 l 18 52 l 52 18 l -52 18 l -18 52 l -18 -52 l -52 -18 Z" fill={stroke} stroke="none" />
        <path d="M 620 420 l 18 -52 l 18 52 l 52 18 l -52 18 l -18 52 l -18 -52 l -52 -18 Z" fill={stroke} stroke="none" />
      </g>
    </svg>
  );
}

// ─── Device frame (minimal) ─────────────────────────────────
function Device({ children, dark = false, w = 402, h = 874 }) {
  return (
    <div style={{
      width: w, height: h, borderRadius: 48, overflow: 'hidden', position: 'relative',
      background: dark ? '#0A0E14' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,.18), 0 0 0 1px rgba(0,0,0,.12)',
    }}>
      <div style={{position:'absolute',top:11,left:'50%',transform:'translateX(-50%)',width:126,height:37,borderRadius:24,background:'#000',zIndex:50}}/>
      <div style={{position:'absolute',top:0,left:0,right:0,zIndex:10,padding:'21px 32px 0',display:'flex',justifyContent:'space-between',color:dark?'#fff':'#000',fontSize:17,fontWeight:600}}>
        <span>9:41</span>
        <span style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{display:'inline-block',width:18,height:11,borderRadius:2,border:`1.5px solid ${dark?'#fff':'#000'}`,position:'relative'}}>
            <span style={{position:'absolute',inset:1.5,width:12,background:dark?'#fff':'#000',borderRadius:1}}/>
          </span>
        </span>
      </div>
      {children}
      <div style={{position:'absolute',bottom:8,left:'50%',transform:'translateX(-50%)',width:139,height:5,borderRadius:100,background:dark?'rgba(255,255,255,.7)':'rgba(0,0,0,.25)',zIndex:60}}/>
    </div>
  );
}

// ─── Jokes-screen background (replicates the existing screen) ─
function JokesBackground({ dark = false }) {
  const bg = dark ? '#0A0E14' : '#F2F2F7';
  const card = dark ? '#141922' : '#fff';
  const text = dark ? '#fff' : '#000';
  const sub = dark ? 'rgba(255,255,255,.55)' : 'rgba(60,60,67,.6)';
  return (
    <div style={{position:'absolute',inset:0,background:bg,paddingTop:62,display:'flex',flexDirection:'column'}}>
      {/* Title row */}
      <div style={{padding:'16px 20px 12px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{fontSize:30,fontWeight:700,letterSpacing:-.6,color:text}}>Jokes</div>
        <div style={{display:'flex',gap:8,background:card,borderRadius:22,padding:'6px 10px',boxShadow:'0 1px 3px rgba(0,0,0,.06)'}}>
          <div style={{width:28,height:28,borderRadius:14,background:'#E5F1FD',display:'flex',alignItems:'center',justifyContent:'center'}}><BBGlyph stroke={BB_BLUE} size={16}/></div>
          <div style={{width:28,height:28,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',color:BB_BLUE,fontSize:20,fontWeight:500}}>+</div>
          <div style={{width:28,height:28,borderRadius:14,border:`1.5px solid ${BB_BLUE}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <svg width="14" height="4" viewBox="0 0 14 4"><circle cx="2" cy="2" r="1.5" fill={BB_BLUE}/><circle cx="7" cy="2" r="1.5" fill={BB_BLUE}/><circle cx="12" cy="2" r="1.5" fill={BB_BLUE}/></svg>
          </div>
        </div>
      </div>
      {/* Search */}
      <div style={{margin:'0 20px',height:40,borderRadius:12,background:dark?'rgba(255,255,255,.08)':'rgba(120,120,128,.12)',display:'flex',alignItems:'center',padding:'0 14px',color:sub,fontSize:15,gap:8}}>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" strokeWidth="1.5"/><path d="M10 10l3 3" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>
        Search jokes
      </div>
      {/* Filter chips */}
      <div style={{display:'flex',gap:8,padding:'14px 20px'}}>
        <Chip dark={dark}>★ Hits</Chip>
        <Chip dark={dark} active>All</Chip>
        <Chip dark={dark}>Recent</Chip>
      </div>
      {/* Joke card */}
      <div style={{margin:'4px 20px',padding:'14px 16px',borderRadius:14,background:card,boxShadow:dark?'none':'0 1px 3px rgba(0,0,0,.04)'}}>
        <div style={{fontSize:16,fontWeight:600,color:text}}>Cats Crazy Because Purr</div>
        <div style={{fontSize:14,color:sub,marginTop:3}}>Cats are crazy, because they purr.</div>
        <div style={{fontSize:12,color:sub,marginTop:6}}>Apr 10</div>
      </div>
      <div style={{margin:'8px 20px',padding:'14px 16px',borderRadius:14,background:card}}>
        <div style={{fontSize:16,fontWeight:600,color:text}}>Uber driver asked if I was okay</div>
        <div style={{fontSize:14,color:sub,marginTop:3}}>I said "yeah, just processing"…</div>
        <div style={{fontSize:12,color:sub,marginTop:6}}>Apr 8</div>
      </div>
    </div>
  );
}

function Chip({ children, active, dark }) {
  const bg = active ? BB_BLUE : (dark ? 'rgba(255,255,255,.1)' : '#fff');
  const color = active ? '#fff' : (dark ? '#fff' : '#1a1a1a');
  return <div style={{padding:'6px 14px',borderRadius:14,background:bg,color,fontSize:14,fontWeight:600,boxShadow:active?'none':(dark?'none':'0 1px 2px rgba(0,0,0,.04)')}}>{children}</div>;
}

// ─── Floating BitBuddy PiP window ───────────────────────────
// Compact, corner-anchored, non-blocking. 3 states: mini / expanded / pinned-full
function BitBuddyPiP({ state = 'expanded', corner = 'br' }) {
  const w = state === 'mini' ? 64 : 260;
  const h = state === 'mini' ? 64 : 340;
  const positions = {
    br: { bottom: 110, right: 16 },
    bl: { bottom: 110, left: 16 },
    tr: { top: 110, right: 16 },
  };
  const pos = positions[corner];

  if (state === 'mini') {
    return (
      <div style={{
        position:'absolute', ...pos, width: w, height: h,
        borderRadius: 32, overflow: 'hidden', zIndex: 40,
        background: BB_BLUE,
        boxShadow: '0 16px 40px rgba(30,144,255,.35), 0 2px 6px rgba(0,0,0,.12)',
        display:'flex', alignItems:'center', justifyContent:'center',
      }}>
        <BBGlyph stroke="#fff" size={36} />
        {/* unread dot */}
        <div style={{position:'absolute',top:8,right:8,width:14,height:14,borderRadius:7,background:'#FF3B30',border:'2px solid #fff',fontSize:9,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>1</div>
      </div>
    );
  }

  return (
    <div style={{
      position:'absolute', ...pos, width: w, height: h,
      borderRadius: 24, overflow: 'hidden', zIndex: 40,
      background: '#fff',
      boxShadow: '0 20px 50px rgba(0,0,0,.18), 0 4px 12px rgba(0,0,0,.08), 0 0 0 .5px rgba(0,0,0,.06)',
      display:'flex', flexDirection:'column',
    }}>
      {/* drag handle / title */}
      <div style={{
        padding:'10px 12px', display:'flex', alignItems:'center', gap:8,
        background: `linear-gradient(180deg, ${BB_BLUE} 0%, ${BB_DEEP} 100%)`,
        color:'#fff', position:'relative',
      }}>
        <div style={{width:26,height:26,borderRadius:13,background:'rgba(255,255,255,.18)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <BBGlyph stroke="#fff" size={16}/>
        </div>
        <div style={{flex:1,lineHeight:1.1}}>
          <div style={{fontSize:13,fontWeight:700,letterSpacing:-.1}}>BitBuddy</div>
          <div style={{fontSize:10,opacity:.75,marginTop:1,display:'flex',alignItems:'center',gap:4}}>
            <span style={{width:6,height:6,borderRadius:3,background:'#30D158'}}/> online
          </div>
        </div>
        {/* window chrome */}
        <div style={{display:'flex',gap:6}}>
          <WinBtn title="Minimize">
            <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 8h6" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"/></svg>
          </WinBtn>
          <WinBtn title="Expand">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 4V1h3M9 6v3H6" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </WinBtn>
          <WinBtn title="Close">
            <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 2l6 6M8 2l-6 6" stroke="#fff" strokeWidth="1.5" strokeLinecap="round"/></svg>
          </WinBtn>
        </div>
        {/* drag grip */}
        <div style={{position:'absolute',bottom:-1,left:'50%',transform:'translateX(-50%)',width:28,height:3,borderRadius:2,background:'rgba(255,255,255,.35)'}}/>
      </div>

      {/* transcript */}
      <div style={{flex:1,padding:'10px 12px',display:'flex',flexDirection:'column',gap:8,overflow:'hidden',fontSize:12.5,background:'#FAFBFD'}}>
        <Bubble who="them"><b>Hey!</b> I scanned your last 12 jokes — want me to flag duplicates?</Bubble>
        <Bubble who="me">Yeah go</Bubble>
        <Bubble who="them">Found <b>2 near-dupes</b> in <i>Cats Crazy</i>. Merge or keep both?</Bubble>
        <div style={{display:'flex',gap:6}}>
          <QuickChip>Merge</QuickChip>
          <QuickChip>Keep both</QuickChip>
          <QuickChip>Show me</QuickChip>
        </div>
      </div>

      {/* composer */}
      <div style={{padding:'8px 10px',borderTop:'.5px solid rgba(0,0,0,.08)',display:'flex',gap:6,alignItems:'center',background:'#fff'}}>
        <div style={{flex:1,height:30,borderRadius:15,background:'#F2F2F7',padding:'0 12px',display:'flex',alignItems:'center',fontSize:12,color:'rgba(60,60,67,.5)'}}>Ask BitBuddy…</div>
        <div style={{width:30,height:30,borderRadius:15,background:BB_BLUE,display:'flex',alignItems:'center',justifyContent:'center'}}>
          <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 10V2M2 6l4-4 4 4" stroke="#fff" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
      </div>
    </div>
  );
}

function WinBtn({ children }) {
  return <div style={{width:18,height:18,borderRadius:9,background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}>{children}</div>;
}

function Bubble({ who, children }) {
  const me = who === 'me';
  return (
    <div style={{display:'flex',justifyContent:me?'flex-end':'flex-start'}}>
      <div style={{
        maxWidth:'85%', padding:'7px 11px', borderRadius:14,
        background: me ? BB_BLUE : '#F0F2F6',
        color: me ? '#fff' : '#1a1a1a',
        borderBottomRightRadius: me ? 4 : 14,
        borderBottomLeftRadius: me ? 14 : 4,
        fontSize:12.5, lineHeight:1.35,
      }}>{children}</div>
    </div>
  );
}

function QuickChip({ children }) {
  return <div style={{padding:'4px 10px',borderRadius:12,background:'#fff',border:`1px solid ${BB_BLUE}40`,color:BB_BLUE,fontSize:11.5,fontWeight:600}}>{children}</div>;
}

// ═══════════════════════════════════════════════════════════════
// ROAST MODE — refined
// ═══════════════════════════════════════════════════════════════
const ROAST_BG = '#0F0A08';      // warm near-black
const ROAST_CARD = '#1C1511';
const ROAST_EDGE = 'rgba(255,120,50,.14)';
const ROAST_ACCENT = '#FF6A35';  // ember orange
const ROAST_ACCENT_2 = '#FFB23F'; // gold
const ROAST_TEXT = '#F5EEE7';
const ROAST_SUB = 'rgba(245,238,231,.55)';

// Flame icon (mono-weight)
function Flame({ size = 20, color = ROAST_ACCENT }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
      <path d="M12 3c.8 2.2.3 4-1 5.5-1.6 1.8-2.5 3.5-2.5 5.5 0 3.6 2.9 6.5 6.5 6.5s6.5-2.9 6.5-6.5c0-3-1.5-5-3.3-6.8-.7 1.1-1.7 1.8-2.7 1.8.5-2.3-.7-4.8-3.5-6z"
            stroke={color} strokeWidth="1.6" strokeLinejoin="round" fill={color+'20'}/>
      <path d="M12 14c0 2 1.3 3.3 3 3.3" stroke={color} strokeWidth="1.6" strokeLinecap="round" opacity=".6"/>
    </svg>
  );
}

function RoastHeader() {
  return (
    <div style={{padding:'72px 20px 18px', position:'relative'}}>
      {/* ambient ember glow */}
      <div style={{position:'absolute',top:40,right:-40,width:260,height:260,borderRadius:'50%',background:`radial-gradient(circle, ${ROAST_ACCENT}33 0%, transparent 70%)`,filter:'blur(20px)',pointerEvents:'none'}}/>
      <div style={{position:'absolute',top:80,left:-60,width:200,height:200,borderRadius:'50%',background:`radial-gradient(circle, ${ROAST_ACCENT_2}22 0%, transparent 70%)`,filter:'blur(30px)',pointerEvents:'none'}}/>

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12,position:'relative'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{padding:'4px 10px',borderRadius:999,background:`linear-gradient(135deg, ${ROAST_ACCENT} 0%, #E8451E 100%)`,display:'flex',alignItems:'center',gap:5,boxShadow:`0 4px 12px ${ROAST_ACCENT}60`}}>
            <Flame size={12} color="#fff"/>
            <span style={{fontSize:10,fontWeight:800,color:'#fff',letterSpacing:1.2,textTransform:'uppercase'}}>Roast Mode</span>
          </div>
          <span style={{fontSize:11,color:ROAST_SUB,fontWeight:500}}>on fire · 3 day streak</span>
        </div>
      </div>

      <div style={{fontSize:34,fontWeight:800,letterSpacing:-.8,color:ROAST_TEXT,lineHeight:1.05,position:'relative'}}>
        Roast Targets
      </div>
      <div style={{fontSize:13,color:ROAST_SUB,marginTop:4}}>12 targets · 48 bits ready</div>
    </div>
  );
}

function RoastTargetCard({ name, role, bits, heat, avatar }) {
  const heatColor = heat > 80 ? ROAST_ACCENT : heat > 50 ? ROAST_ACCENT_2 : 'rgba(245,238,231,.4)';
  return (
    <div style={{
      margin:'6px 16px', padding:16, borderRadius:18,
      background: `linear-gradient(135deg, ${ROAST_CARD} 0%, #231914 100%)`,
      border: `.5px solid ${ROAST_EDGE}`,
      position:'relative', overflow:'hidden',
    }}>
      {/* ember accent line on left */}
      <div style={{position:'absolute',left:0,top:0,bottom:0,width:3,background:`linear-gradient(180deg, transparent 0%, ${ROAST_ACCENT} 50%, transparent 100%)`,opacity:heat>70?.9:.3}}/>

      <div style={{display:'flex',alignItems:'center',gap:12}}>
        {/* avatar */}
        <div style={{width:44,height:44,borderRadius:22,background:avatar,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,fontWeight:700,color:'#fff',flexShrink:0,position:'relative'}}>
          {name.split(' ').map(n=>n[0]).join('')}
          {heat > 80 && <div style={{position:'absolute',bottom:-2,right:-2,width:18,height:18,borderRadius:9,background:'#0F0A08',display:'flex',alignItems:'center',justifyContent:'center'}}><Flame size={12}/></div>}
        </div>

        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:16,fontWeight:700,color:ROAST_TEXT,letterSpacing:-.2}}>{name}</div>
          <div style={{fontSize:12,color:ROAST_SUB,marginTop:1}}>{role}</div>
        </div>

        <div style={{textAlign:'right'}}>
          <div style={{fontSize:20,fontWeight:800,color:ROAST_TEXT,letterSpacing:-.3,lineHeight:1}}>{bits}</div>
          <div style={{fontSize:10,color:ROAST_SUB,marginTop:2,textTransform:'uppercase',letterSpacing:.8,fontWeight:600}}>bits</div>
        </div>
      </div>

      {/* heat bar */}
      <div style={{marginTop:12,display:'flex',alignItems:'center',gap:8}}>
        <div style={{flex:1,height:4,borderRadius:2,background:'rgba(245,238,231,.08)',overflow:'hidden'}}>
          <div style={{height:'100%',width:`${heat}%`,background:`linear-gradient(90deg, ${ROAST_ACCENT_2} 0%, ${ROAST_ACCENT} 100%)`,borderRadius:2,boxShadow:`0 0 8px ${heatColor}80`}}/>
        </div>
        <div style={{fontSize:10,color:heatColor,fontWeight:700,letterSpacing:.5,minWidth:30,textAlign:'right'}}>{heat}°</div>
      </div>
    </div>
  );
}

function RoastSettingsRow({ title, sub, val, right }) {
  return (
    <div style={{
      padding:'14px 18px', display:'flex', alignItems:'center', gap:14,
      borderBottom:`.5px solid ${ROAST_EDGE}`,
    }}>
      <div style={{flex:1}}>
        <div style={{fontSize:15,fontWeight:600,color:ROAST_TEXT,letterSpacing:-.2}}>{title}</div>
        {sub && <div style={{fontSize:12,color:ROAST_SUB,marginTop:2,lineHeight:1.35}}>{sub}</div>}
      </div>
      {right}
    </div>
  );
}

function RoastToggle({ on }) {
  return (
    <div style={{
      width:51, height:31, borderRadius:16,
      background: on ? `linear-gradient(135deg, ${ROAST_ACCENT} 0%, #E8451E 100%)` : 'rgba(245,238,231,.12)',
      position:'relative', transition:'all .2s',
      boxShadow: on ? `0 0 16px ${ROAST_ACCENT}60, inset 0 0 0 .5px rgba(255,255,255,.15)` : 'inset 0 0 0 .5px rgba(255,255,255,.08)',
    }}>
      <div style={{position:'absolute',top:2,left: on ? 22 : 2,width:27,height:27,borderRadius:14,background:'#fff',boxShadow:'0 2px 4px rgba(0,0,0,.3)',transition:'all .2s'}}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// PAGE
// ═══════════════════════════════════════════════════════════════
function Page() {
  return (
    <div style={{padding:'48px 40px 80px',background:'#F5F3EE',minHeight:'100vh'}}>
      <div style={{maxWidth:1480,margin:'0 auto'}}>

        {/* Header */}
        <div style={{marginBottom:8,fontSize:11,letterSpacing:2,textTransform:'uppercase',color:'#9a8a70',fontWeight:600}}>BitBinder · Refinements</div>
        <div style={{fontSize:36,fontWeight:700,letterSpacing:-.8,color:'#2a2015'}}>Compact BitBuddy & polished Roast Mode</div>
        <div style={{fontSize:15,color:'#5a4a30',marginTop:10,lineHeight:1.55,maxWidth:760}}>
          Two design fixes: (1) make BitBuddy a corner-anchored floating window that never blocks the app,
          and (2) give Roast Mode a real identity — warm-black canvas, ember gradients, heat meters, proper typography —
          so it reads as intentional, not a cobbled-together dark theme.
        </div>

        {/* ═══ BitBuddy PiP ═══ */}
        <SectionTitle n="01" title="BitBuddy · floating chat" sub="Compact, corner-pinned, draggable. Three states: mini puck, expanded panel, pinned-fullscreen. Stays on top without blocking the joke you're looking at."/>

        <div style={{display:'flex',gap:40,flexWrap:'wrap',marginBottom:48}}>

          {/* Mini puck */}
          <Board label="01a · mini puck (collapsed)" note="Tap to expand. Unread count surfaces. Lives bottom-right, above the tab bar.">
            <Device>
              <JokesBackground/>
              <BitBuddyPiP state="mini" corner="br"/>
            </Device>
          </Board>

          {/* Expanded */}
          <Board label="01b · expanded panel (default)" note="260×340 floating window. Drag by the blue header. Working space still visible underneath.">
            <Device>
              <JokesBackground/>
              <BitBuddyPiP state="expanded" corner="br"/>
            </Device>
          </Board>

          {/* Corner variants */}
          <Board label="01c · any corner" note="Double-tap header to snap to another corner. Auto-dodges the tab bar and nav.">
            <Device>
              <JokesBackground/>
              <BitBuddyPiP state="expanded" corner="tr"/>
            </Device>
          </Board>
        </div>

        {/* State map */}
        <Board label="state map" note="Minimal decision tree for the floating window." full>
          <div style={{background:'#fff',borderRadius:16,padding:'28px 32px',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:20,boxShadow:'0 1px 3px rgba(0,0,0,.04)'}}>
            {[
              {k:'Dismissed',v:'Not visible. Re-summon from Jokes toolbar sparkle-chat icon.'},
              {k:'Mini (puck)',v:'64×64 blue disc with glyph. Badges unread count. Tap = expand.'},
              {k:'Expanded',v:'260×340. Header draggable. Minimize → mini. Expand → full. × = dismiss.'},
              {k:'Full sheet',v:'For long threads / tool-use. Same sheet as today, but with a "pop out" button to go back to expanded.'},
            ].map(s => (
              <div key={s.k} style={{padding:'12px 14px',borderRadius:12,background:'#FAFAF7',border:'1px solid #EEEAE0'}}>
                <div style={{fontSize:12,fontWeight:700,color:BB_BLUE,letterSpacing:.3,textTransform:'uppercase'}}>{s.k}</div>
                <div style={{fontSize:13,color:'#3a3328',marginTop:4,lineHeight:1.45}}>{s.v}</div>
              </div>
            ))}
          </div>
        </Board>

        {/* ═══ Roast Mode ═══ */}
        <SectionTitle n="02" title="Roast Mode · polished" sub="Keeps the warm brand but gets a proper identity. Warm near-black canvas instead of plain gray. Ember-gradient accents. Per-target heat meters. Typographic hierarchy that actually earns the 'on fire' pitch."/>

        <div style={{display:'flex',gap:40,flexWrap:'wrap',marginBottom:48}}>

          {/* Roast Targets list */}
          <Board label="02a · roast targets" note="Replaces the flat list. Heat meter = frequency + recency. Flame badge on hottest targets.">
            <Device dark>
              <div style={{position:'absolute',inset:0,background:ROAST_BG,paddingBottom:60,overflow:'hidden'}}>
                <RoastHeader/>
                <RoastTargetCard name="Mom" role="Tech-skeptic, loves TikTok" bits={14} heat={92} avatar={`linear-gradient(135deg, ${ROAST_ACCENT} 0%, #C23618 100%)`}/>
                <RoastTargetCard name="Dave K." role="Gym friend, CrossFit guy" bits={9} heat={76} avatar={`linear-gradient(135deg, ${ROAST_ACCENT_2} 0%, #D17A00 100%)`}/>
                <RoastTargetCard name="Uber Drivers" role="Category" bits={7} heat={58} avatar={`linear-gradient(135deg, #5B7FD9 0%, #2E4BA5 100%)`}/>
                <RoastTargetCard name="Landlord" role="The Slumlord" bits={5} heat={34} avatar={`linear-gradient(135deg, #7A6B5C 0%, #4A3F35 100%)`}/>
              </div>
            </Device>
          </Board>

          {/* Roast target detail */}
          <Board label="02b · target detail" note="Individual roast target page. Hierarchy, not a dump.">
            <Device dark>
              <div style={{position:'absolute',inset:0,background:ROAST_BG,paddingTop:62,overflow:'hidden'}}>
                {/* back */}
                <div style={{padding:'10px 16px',display:'flex',justifyContent:'space-between'}}>
                  <div style={{width:36,height:36,borderRadius:18,background:'rgba(245,238,231,.08)',display:'flex',alignItems:'center',justifyContent:'center',color:ROAST_ACCENT}}>
                    <svg width="10" height="16" viewBox="0 0 10 16"><path d="M8 2L2 8l6 6" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
                  </div>
                  <div style={{width:36,height:36,borderRadius:18,background:'rgba(245,238,231,.08)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Flame size={16}/>
                  </div>
                </div>
                {/* hero */}
                <div style={{padding:'8px 20px 20px',position:'relative'}}>
                  <div style={{position:'absolute',top:-20,right:-60,width:260,height:260,borderRadius:'50%',background:`radial-gradient(circle, ${ROAST_ACCENT}44 0%, transparent 70%)`,filter:'blur(20px)'}}/>
                  <div style={{display:'flex',gap:14,alignItems:'center',position:'relative'}}>
                    <div style={{width:72,height:72,borderRadius:36,background:`linear-gradient(135deg, ${ROAST_ACCENT} 0%, #C23618 100%)`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,fontWeight:800,color:'#fff',boxShadow:`0 8px 24px ${ROAST_ACCENT}60`}}>M</div>
                    <div>
                      <div style={{fontSize:28,fontWeight:800,color:ROAST_TEXT,letterSpacing:-.5,lineHeight:1}}>Mom</div>
                      <div style={{fontSize:13,color:ROAST_SUB,marginTop:4}}>Tech-skeptic, loves TikTok</div>
                    </div>
                  </div>
                  {/* stat strip */}
                  <div style={{display:'flex',gap:10,marginTop:18}}>
                    <Stat n="14" l="bits" hot/>
                    <Stat n="92°" l="heat" hot/>
                    <Stat n="6" l="tagged sets"/>
                    <Stat n="3d" l="streak"/>
                  </div>
                </div>
                {/* bits list */}
                <div style={{padding:'0 16px'}}>
                  <div style={{fontSize:11,color:ROAST_SUB,textTransform:'uppercase',letterSpacing:1.5,fontWeight:700,padding:'4px 4px 10px'}}>Hot Bits</div>
                  <BitRow title="The TikTok theory" hit={true} days={2}/>
                  <BitRow title="Typing with one finger" hit={false} days={5}/>
                  <BitRow title="Bluetooth exorcism" hit={true} days={8}/>
                </div>
              </div>
            </Device>
          </Board>

          {/* Settings row */}
          <Board label="02c · roast mode settings" note="The toggle & context from Settings — refined.">
            <Device dark>
              <div style={{position:'absolute',inset:0,background:ROAST_BG,paddingTop:62}}>
                <div style={{padding:'16px 20px 8px'}}>
                  <div style={{fontSize:30,fontWeight:800,color:ROAST_TEXT,letterSpacing:-.6}}>Settings</div>
                </div>
                {/* hero roast card */}
                <div style={{margin:'16px',padding:20,borderRadius:20,background:`linear-gradient(135deg, #1C1511 0%, #2A1812 100%)`,border:`.5px solid ${ROAST_EDGE}`,position:'relative',overflow:'hidden'}}>
                  <div style={{position:'absolute',top:-30,right:-30,width:160,height:160,borderRadius:'50%',background:`radial-gradient(circle, ${ROAST_ACCENT}55 0%, transparent 70%)`,filter:'blur(20px)'}}/>
                  <div style={{display:'flex',alignItems:'center',gap:12,position:'relative'}}>
                    <div style={{width:44,height:44,borderRadius:14,background:`linear-gradient(135deg, ${ROAST_ACCENT} 0%, #E8451E 100%)`,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 6px 16px ${ROAST_ACCENT}60`}}>
                      <Flame size={22} color="#fff"/>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:17,fontWeight:800,color:ROAST_TEXT,letterSpacing:-.3}}>Roast Mode</div>
                      <div style={{fontSize:12,color:ROAST_SUB,marginTop:2}}>Organize by target, not folder</div>
                    </div>
                    <RoastToggle on/>
                  </div>
                </div>
                {/* grouped prefs */}
                <div style={{margin:'16px',borderRadius:20,background:ROAST_CARD,border:`.5px solid ${ROAST_EDGE}`,overflow:'hidden'}}>
                  <RoastSettingsRow title="Heat decay" sub="Bits cool over time unless practiced" right={<span style={{fontSize:14,color:ROAST_ACCENT_2,fontWeight:600}}>7 days</span>}/>
                  <RoastSettingsRow title="Auto-tag targets" sub="BitBuddy detects names & categories" right={<RoastToggle on/>}/>
                  <RoastSettingsRow title="Hide from main jokes list" sub="Keep roast material in its own world" right={<RoastToggle/>}/>
                </div>
              </div>
            </Device>
          </Board>
        </div>

        {/* Before/after */}
        <SectionTitle n="03" title="Before / after" sub="Side-by-side of Roast Mode today vs. refined."/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24,maxWidth:900}}>
          <div style={{background:'#fff',borderRadius:16,padding:20,border:'1px solid #E5E2D9'}}>
            <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:1.5,fontWeight:700,color:'#9a8a70'}}>Today</div>
            <ul style={{fontSize:13,color:'#4a4230',lineHeight:1.7,paddingLeft:16,marginTop:10}}>
              <li>Flat light-gray background, same as everything else</li>
              <li>Drop icon reads as "water," not "flame"</li>
              <li>No sense of frequency / recency per target</li>
              <li>Typography identical to rest of app — nothing signals "this mode is different"</li>
            </ul>
          </div>
          <div style={{background:`linear-gradient(135deg, ${ROAST_BG} 0%, #1A100C 100%)`,borderRadius:16,padding:20,border:`.5px solid ${ROAST_EDGE}`,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:-20,right:-20,width:120,height:120,borderRadius:'50%',background:`radial-gradient(circle, ${ROAST_ACCENT}44 0%, transparent 70%)`,filter:'blur(20px)'}}/>
            <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:1.5,fontWeight:700,color:ROAST_ACCENT_2,position:'relative'}}>Refined</div>
            <ul style={{fontSize:13,color:ROAST_TEXT,lineHeight:1.7,paddingLeft:16,marginTop:10,position:'relative'}}>
              <li>Warm near-black canvas with ember-glow ambience</li>
              <li>Proper flame glyph + gradient accents</li>
              <li>Per-target <b style={{color:ROAST_ACCENT_2}}>heat meter</b> — recency + frequency</li>
              <li>Bolder display type; mode reads as its own product</li>
            </ul>
          </div>
        </div>

        {/* Next */}
        <div style={{marginTop:56,maxWidth:720}}>
          <div style={{fontSize:18,fontWeight:600,color:'#2a2015'}}>Next</div>
          <ul style={{fontSize:14,color:'#5a4a30',lineHeight:1.7,paddingLeft:20}}>
            <li>Confirm the floating window is the direction — I'll write the SwiftUI view (drag, snap-to-corner, state machine)</li>
            <li>Lock in the roast palette — ember orange <code>#FF6A35</code>, gold <code>#FFB23F</code>, warm-black <code>#0F0A08</code> — and I'll produce the full screen spec</li>
            <li>Optional: motion — flame flicker on hottest target, heat-bar fill animation</li>
          </ul>
        </div>

      </div>
    </div>
  );
}

function SectionTitle({ n, title, sub }) {
  return (
    <div style={{marginTop:56,marginBottom:20}}>
      <div style={{display:'flex',alignItems:'baseline',gap:12}}>
        <div style={{fontSize:12,fontWeight:700,color:'#b8a888',letterSpacing:1.5}}>{n}</div>
        <div style={{fontSize:24,fontWeight:700,letterSpacing:-.4,color:'#2a2015'}}>{title}</div>
      </div>
      {sub && <div style={{fontSize:14,color:'#5a4a30',marginTop:6,lineHeight:1.5,maxWidth:760}}>{sub}</div>}
    </div>
  );
}

function Board({ label, note, children, full }) {
  return (
    <div style={{marginBottom:20, width: full ? '100%' : 'auto'}}>
      <div style={{fontSize:12,fontWeight:500,color:'rgba(60,50,40,.7)',marginBottom:10}}>{label}</div>
      {children}
      {note && <div style={{fontSize:12,color:'rgba(60,50,40,.55)',marginTop:10,maxWidth:380,lineHeight:1.45}}>{note}</div>}
    </div>
  );
}

function Stat({ n, l, hot }) {
  return (
    <div style={{flex:1,padding:'10px 4px',borderRadius:12,background:hot?`linear-gradient(135deg, ${ROAST_ACCENT}20 0%, ${ROAST_ACCENT}08 100%)`:'rgba(245,238,231,.06)',border:hot?`.5px solid ${ROAST_ACCENT}40`:`.5px solid rgba(245,238,231,.08)`,textAlign:'center'}}>
      <div style={{fontSize:18,fontWeight:800,color:hot?ROAST_ACCENT_2:ROAST_TEXT,letterSpacing:-.3,lineHeight:1}}>{n}</div>
      <div style={{fontSize:10,color:ROAST_SUB,marginTop:4,textTransform:'uppercase',letterSpacing:.8,fontWeight:600}}>{l}</div>
    </div>
  );
}

function BitRow({ title, hit, days }) {
  return (
    <div style={{padding:'12px 14px',marginBottom:6,borderRadius:12,background:ROAST_CARD,border:`.5px solid ${ROAST_EDGE}`,display:'flex',alignItems:'center',gap:10}}>
      {hit && <div style={{width:22,height:22,borderRadius:11,background:`${ROAST_ACCENT}20`,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{color:ROAST_ACCENT,fontSize:12}}>★</span></div>}
      <div style={{flex:1,fontSize:14,fontWeight:600,color:ROAST_TEXT}}>{title}</div>
      <div style={{fontSize:11,color:ROAST_SUB}}>{days}d ago</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Page/>);
</script>
</body>
</html>
